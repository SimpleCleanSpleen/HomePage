<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lazy's 1930s Dashboard</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a1a;
            font-family: 'Courier New', Courier, monospace;
        }

        #dashboard-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
        }

        /* Layer 1: Background */
        #background-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: background-image 1s ease-in-out;
            z-index: 1;
        }

        /* Layer 2: Weather Overlays (Sprites) */
        #weather-overlay-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            z-index: 2;
            pointer-events: none;
        }

        .weather-sprite {
            width: 450px; /* Scaled up */
            margin-top: 5vh;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.6));
        }

        /* Layer 3: Characters */
        #character-layer {
            position: absolute;
            bottom: 120px; /* Raised to make room for dock */
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            transition: all 0.5s ease-in-out;
        }

        #characters {
            height: 75vh; /* Much larger scaling */
            filter: drop-shadow(10px 10px 25px rgba(0,0,0,0.8));
            animation: bounce 2.5s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* Layer 4: Particles (Rain/Snow/Hail) */
        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 4;
            pointer-events: none;
        }

        /* Layer 5: Fog Effect (Over everything) */
        #fog-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 200%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/fog.png');
            opacity: 0;
            z-index: 5;
            pointer-events: none;
            animation: fogMove 40s linear infinite;
            transition: opacity 3s ease-in-out;
        }

        @keyframes fogMove {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        /* UI: Links Dock */
        #links-dock {
            position: relative;
            z-index: 20;
            width: 90%;
            max-width: 1200px;
            background: rgba(30, 30, 30, 0.7);
            backdrop-filter: blur(8px);
            border: 4px double #888;
            border-radius: 15px 15px 0 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 20px;
            overflow-x: auto;
            margin-bottom: 0;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.8);
        }

        .app-link {
            transition: transform 0.2s, filter 0.2s;
            flex-shrink: 0;
        }

        .app-link:hover {
            transform: scale(1.2) translateY(-10px);
            filter: brightness(1.3);
        }

        .app-icon {
            width: 60px;
            height: 60px;
            image-rendering: pixelated; /* Keeps that vintage vibe */
        }

        /* UI: Weather Info */
        #weather-info {
            position: absolute;
            top: 25px;
            left: 25px;
            background: rgba(20, 20, 20, 0.9);
            color: #efefef;
            padding: 15px 25px;
            border: 3px double #999;
            z-index: 30;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        #temp-display { font-size: 24px; font-weight: bold; }
        #desc-display { font-size: 14px; opacity: 0.8; }

        .error-box { color: #ff6666; font-size: 10px; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="dashboard-container">
        <!-- Environmental Layers -->
        <div id="background-layer"></div>
        <div id="weather-overlay-layer"></div>
        <div id="character-layer">
            <img id="characters" src="" alt="The Duo">
        </div>
        <canvas id="particle-canvas"></canvas>
        <div id="fog-layer"></div>

        <!-- Dashboard UI -->
        <div id="weather-info">
            <div id="temp-display">SYNCING...</div>
            <div id="desc-display">---</div>
            <div id="error-display" class="error-box"></div>
        </div>

        <div id="links-dock">
            <a href="#" class="app-link"><img src="gmail.png" class="app-icon" title="Gmail"></a>
            <a href="#" class="app-link"><img src="youtube.png" class="app-icon" title="YouTube"></a>
            <a href="#" class="app-link"><img src="googleDrive.png" class="app-icon" title="Drive"></a>
            <a href="#" class="app-link"><img src="googleCalendar.png" class="app-icon" title="Calendar"></a>
            <a href="#" class="app-link"><img src="messages.png" class="app-icon" title="Messages"></a>
            <a href="#" class="app-link"><img src="noteBookLM.png" class="app-icon" title="Notebook"></a>
            <a href="#" class="app-link"><img src="stremio.png" class="app-icon" title="Stremio"></a>
            <a href="#" class="app-link"><img src="cheapShark.png" class="app-icon" title="CheapShark"></a>
            <a href="#" class="app-link"><img src="portainer.png" class="app-icon" title="Portainer"></a>
            <a href="#" class="app-link"><img src="jellyfin.png" class="app-icon" title="Jellyfin"></a>
            <a href="#" class="app-link"><img src="deepSeek.png" class="app-icon" title="DeepSeek"></a>
            <a href="#" class="app-link"><img src="protonMail.png" class="app-icon" title="ProtonMail"></a>
            <a href="#" class="app-link"><img src="protonDrive.png" class="app-icon" title="ProtonDrive"></a>
            <a href="#" class="app-link"><img src="protonCalendar.png" class="app-icon" title="ProtonCalendar"></a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let weatherType = 'clear';

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(type) {
                this.type = type;
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * -canvas.height;
                this.speed = (this.type === 'snow') ? Math.random() * 1.2 + 0.5 : Math.random() * 8 + 8;
                this.size = (this.type === 'hail') ? Math.random() * 6 + 4 : Math.random() * 2 + 1;
                this.wind = Math.random() * 2 - 1;
            }
            update() {
                this.y += this.speed;
                this.x += this.wind;
                if (this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.beginPath();
                if (this.type === 'rain') {
                    ctx.strokeStyle = 'rgba(200, 220, 255, 0.4)';
                    ctx.lineWidth = 1;
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(this.x + (this.wind * 2), this.y + 15);
                    ctx.stroke();
                } else {
                    ctx.fillStyle = (this.type === 'hail') ? 'rgba(230, 230, 230, 0.9)' : 'rgba(255, 255, 255, 0.85)';
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function initParticles(type) {
            particles = [];
            let count = (type === 'rain') ? 250 : (type === 'snow') ? 150 : 80;
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(type));
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (['rain', 'snow', 'hail'].includes(weatherType)) {
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
            }
            requestAnimationFrame(animate);
        }
        animate();

        async function updateDashboard() {
            const errorDisplay = document.getElementById('error-display');
            try {
                const response = await fetch('weather.json?nocache=' + new Date().getTime());
                if (!response.ok) throw new Error('Data Sync Offline');
                
                const data = await response.json();
                const temp = parseInt(data.temp);
                const weatherDesc = data.weather.toLowerCase();

                document.getElementById('temp-display').innerText = temp + '°F';
                document.getElementById('desc-display').innerText = weatherDesc;
                errorDisplay.innerText = '';

                // Asset Mapping
                let bgFile = '';
                let charFile = '';

                if (temp >= 80) {
                    bgFile = 'Background_80°F+ (Heatwave).png';
                    charFile = 'Character Sprite_80°F+ (Heatwave).png';
                } else if (temp >= 70) {
                    bgFile = 'Background_70-79°F (Warm).jpg';
                    charFile = 'Character Sprite_70-79°F (Warm).png';
                } else if (temp >= 60) {
                    bgFile = 'Background_60-69°F (Mild).jpeg';
                    charFile = 'Character Sprite_60-69°F (Mild).png';
                } else if (temp >= 35) {
                    bgFile = 'Background_35-59°F (Chilly).jpeg';
                    charFile = 'Character Sprite_35-59°F (Chilly).png';
                } else {
                    bgFile = 'Background_35-59°F (Chilly).jpeg';
                    charFile = 'Character Sprite_35°F (Freezing).png';
                }

                document.getElementById('background-layer').style.backgroundImage = `url('${encodeURIComponent(bgFile)}')`;
                document.getElementById('characters').src = encodeURIComponent(charFile);

                // Overlay & Particles
                const overlayLayer = document.getElementById('weather-overlay-layer');
                const fogLayer = document.getElementById('fog-layer');
                
                overlayLayer.innerHTML = '';
                fogLayer.style.opacity = '0';
                weatherType = 'clear';

                if (weatherDesc.includes('rain')) {
                    weatherType = 'rain';
                    overlayLayer.innerHTML = `<img src="${encodeURIComponent('Weather Overlay_Rain.png')}" class="weather-sprite">`;
                    initParticles('rain');
                } else if (weatherDesc.includes('snow')) {
                    weatherType = 'snow';
                    overlayLayer.innerHTML = `<img src="${encodeURIComponent('Weather Overlay_Snow.png')}" class="weather-sprite">`;
                    initParticles('snow');
                } else if (weatherDesc.includes('hail')) {
                    weatherType = 'hail';
                    overlayLayer.innerHTML = `<img src="${encodeURIComponent('Weather Overlay_Hail.png')}" class="weather-sprite">`;
                    initParticles('hail');
                } else if (weatherDesc.includes('fog') || weatherDesc.includes('mist')) {
                    fogLayer.style.opacity = '0.65';
                } else if (weatherDesc.includes('tornado')) {
                    overlayLayer.innerHTML = `<img src="${encodeURIComponent('Weather Overlay_Tornado.png')}" class="weather-sprite">`;
                }

            } catch (err) {
                console.error(err);
                errorDisplay.innerText = 'Sync Error: Check GitHub Data';
            }
        }

        updateDashboard();
        setInterval(updateDashboard, 60000);
    </script>
</body>
</html>
