<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lazy's 1930s Dashboard</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000; /* Letterbox color */
            font-family: 'Courier New', Courier, monospace;
        }

        #dashboard-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* The central visual area */
        #stage {
            position: relative;
            width: 100%;
            max-width: 100vw;
            height: 80vh; /* Leave room for dock */
            overflow: hidden;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Layer 1: Background - Scaling to width */
        #background-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: contain; /* Fits image without cropping */
            background-repeat: no-repeat;
            background-position: center;
            transition: background-image 1s ease-in-out;
            z-index: 1;
        }

        /* Layer 2: Weather Overlays */
        #weather-overlay-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            z-index: 2;
            pointer-events: none;
        }

        .weather-sprite {
            width: 30%;
            max-width: 400px;
            margin-top: 5%;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.6));
        }

        /* Layer 3: Characters - Moved to Left on Trail */
        #character-layer {
            position: absolute;
            bottom: 15%; /* Adjusted for trail perspective */
            left: 20%; /* Positioned on the left side trail */
            z-index: 3;
            transition: all 0.5s ease-in-out;
            pointer-events: none;
        }

        #characters {
            height: 45vh; /* Scaled to fit naturally on the path */
            filter: drop-shadow(10px 10px 20px rgba(0,0,0,0.8));
            animation: bounce 2.5s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Layer 4: Particles */
        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 4;
            pointer-events: none;
        }

        /* Layer 5: Fog Layer */
        #fog-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 200%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/fog.png');
            opacity: 0;
            z-index: 5;
            pointer-events: none;
            animation: fogMove 40s linear infinite;
            transition: opacity 3s ease-in-out;
        }

        @keyframes fogMove {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        /* UI: Links Dock */
        #links-dock {
            position: fixed;
            bottom: 0;
            z-index: 20;
            width: 100%;
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(10px);
            border-top: 3px double #666;
            padding: 10px 0;
            display: flex;
            justify-content: center;
            gap: 15px;
            overflow-x: auto;
        }

        .app-link {
            transition: transform 0.2s;
            flex-shrink: 0;
            padding: 5px;
        }

        .app-link:hover { transform: scale(1.15) translateY(-5px); }
        .app-icon { width: 50px; height: 50px; }

        /* UI: Weather Info */
        #weather-info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 10px 20px;
            border: 2px solid #444;
            z-index: 30;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #temp-display { font-size: 20px; font-weight: bold; }
        #desc-display { font-size: 12px; opacity: 0.7; }
        .error-box { color: #ff5555; font-size: 10px; }
    </style>
</head>
<body>

    <div id="dashboard-container">
        <div id="stage">
            <div id="background-layer"></div>
            <div id="weather-overlay-layer"></div>
            <div id="character-layer">
                <img id="characters" src="" alt="Duo">
            </div>
            <canvas id="particle-canvas"></canvas>
            <div id="fog-layer"></div>

            <div id="weather-info">
                <div id="temp-display">LOADING...</div>
                <div id="desc-display">---</div>
                <div id="error-display" class="error-box"></div>
            </div>
        </div>

        <div id="links-dock">
            <a href="#" class="app-link"><img src="gmail.png" class="app-icon" title="Gmail"></a>
            <a href="#" class="app-link"><img src="youtube.png" class="app-icon" title="YouTube"></a>
            <a href="#" class="app-link"><img src="googleDrive.png" class="app-icon" title="Drive"></a>
            <a href="#" class="app-link"><img src="googleCalendar.png" class="app-icon" title="Calendar"></a>
            <a href="#" class="app-link"><img src="messages.png" class="app-icon" title="Messages"></a>
            <a href="#" class="app-link"><img src="noteBookLM.png" class="app-icon" title="Notebook"></a>
            <a href="#" class="app-link"><img src="stremio.png" class="app-icon" title="Stremio"></a>
            <a href="#" class="app-link"><img src="cheapShark.png" class="app-icon" title="CheapShark"></a>
            <a href="#" class="app-link"><img src="portainer.png" class="app-icon" title="Portainer"></a>
            <a href="#" class="app-link"><img src="jellyfin.png" class="app-icon" title="Jellyfin"></a>
            <a href="#" class="app-link"><img src="deepSeek.png" class="app-icon" title="DeepSeek"></a>
            <a href="#" class="app-link"><img src="protonMail.png" class="app-icon" title="ProtonMail"></a>
            <a href="#" class="app-link"><img src="protonDrive.png" class="app-icon" title="ProtonDrive"></a>
            <a href="#" class="app-link"><img src="protonCalendar.png" class="app-icon" title="ProtonCalendar"></a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let weatherType = 'clear';

        function resizeCanvas() {
            canvas.width = document.getElementById('stage').clientWidth;
            canvas.height = document.getElementById('stage').clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(type) {
                this.type = type;
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * -canvas.height;
                this.speed = (this.type === 'snow') ? Math.random() * 1 + 0.5 : Math.random() * 6 + 4;
                this.size = (this.type === 'hail') ? Math.random() * 5 + 2 : Math.random() * 2 + 1;
                this.wind = Math.random() * 1 - 0.5;
            }
            update() {
                this.y += this.speed;
                this.x += this.wind;
                if (this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.beginPath();
                if (this.type === 'rain') {
                    ctx.strokeStyle = 'rgba(180, 200, 255, 0.4)';
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(this.x, this.y + 10);
                    ctx.stroke();
                } else {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function initParticles(type) {
            particles = [];
            let count = (type === 'rain') ? 150 : (type === 'snow') ? 100 : 50;
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(type));
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (['rain', 'snow', 'hail'].includes(weatherType)) {
                particles.forEach(p => { p.update(); p.draw(); });
            }
            requestAnimationFrame(animate);
        }
        animate();

        async function updateDashboard() {
            const errorDisplay = document.getElementById('error-display');
            try {
                const response = await fetch('weather.json?t=' + new Date().getTime());
                if (!response.ok) throw new Error('Offline');
                
                const data = await response.json();
                const temp = parseInt(data.temp);
                const weatherDesc = data.weather.toLowerCase();

                document.getElementById('temp-display').innerText = temp + '°F';
                document.getElementById('desc-display').innerText = weatherDesc;
                errorDisplay.innerText = '';

                let bgFile = '';
                let charFile = '';

                if (temp >= 80) {
                    bgFile = 'Background_80°F+ (Heatwave).png';
                    charFile = 'Character Sprite_80°F+ (Heatwave).png';
                } else if (temp >= 70) {
                    bgFile = 'Background_70-79°F (Warm).jpg';
                    charFile = 'Character Sprite_70-79°F (Warm).png';
                } else if (temp >= 60) {
                    bgFile = 'Background_60-69°F (Mild).jpeg';
                    charFile = 'Character Sprite_60-69°F (Mild).png';
                } else if (temp >= 35) {
                    bgFile = 'Background_35-59°F (Chilly).jpeg';
                    charFile = 'Character Sprite_35-59°F (Chilly).png';
                } else {
                    bgFile = 'Background_35-59°F (Chilly).jpeg';
                    charFile = 'Character Sprite_35°F (Freezing).png';
                }

                document.getElementById('background-layer').style.backgroundImage = `url('${encodeURIComponent(bgFile)}')`;
                document.getElementById('characters').src = encodeURIComponent(charFile);

                const overlayLayer = document.getElementById('weather-overlay-layer');
                const fogLayer = document.getElementById('fog-layer');
                overlayLayer.innerHTML = '';
                fogLayer.style.opacity = '0';
                weatherType = 'clear';

                if (weatherDesc.includes('rain')) {
                    weatherType = 'rain';
                    overlayLayer.innerHTML = `<img src="${encodeURIComponent('Weather Overlay_Rain.png')}" class="weather-sprite">`;
                    initParticles('rain');
                } else if (weatherDesc.includes('snow')) {
                    weatherType = 'snow';
                    overlayLayer.innerHTML = `<img src="${encodeURIComponent('Weather Overlay_Snow.png')}" class="weather-sprite">`;
                    initParticles('snow');
                } else if (weatherDesc.includes('hail')) {
                    weatherType = 'hail';
                    overlayLayer.innerHTML = `<img src="${encodeURIComponent('Weather Overlay_Hail.png')}" class="weather-sprite">`;
                    initParticles('hail');
                } else if (weatherDesc.includes('fog') || weatherDesc.includes('mist')) {
                    fogLayer.style.opacity = '0.6';
                } else if (weatherDesc.includes('tornado')) {
                    overlayLayer.innerHTML = `<img src="${encodeURIComponent('Weather Overlay_Tornado.png')}" class="weather-sprite">`;
                }

            } catch (err) {
                errorDisplay.innerText = 'Sync Error';
            }
        }

        updateDashboard();
        setInterval(updateDashboard, 60000);
    </script>
</body>
</html>
