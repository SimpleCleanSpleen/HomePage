<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lazy's Vintage Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a1a;
            font-family: 'Special Elite', 'Courier New', Courier, monospace;
        }

        /* Vintage Film Grain Overlay */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.35;
            pointer-events: none;
            z-index: 9999;
            animation: filmGrain 8s steps(10) infinite;
        }

        @keyframes filmGrain {
            0%, 100% { background-position: 0 0; }
            50% { background-position: 10px 10px; }
        }

        #dashboard-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
        }

        #stage {
            position: relative;
            width: 100%;
            height: 55vh; 
            overflow: hidden;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            box-shadow: inset 0 -15px 40px rgba(0,0,0,0.9);
            border-bottom: 6px solid #000;
        }

        #background-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover; 
            background-repeat: no-repeat;
            background-position: center center;
            transition: background-image 1s ease-in-out;
            z-index: 1;
            animation: jostle 20s ease-in-out infinite;
            filter: grayscale(80%) sepia(40%) contrast(120%) brightness(90%);
        }

        @keyframes jostle {
            0%, 100% { transform: scale(1.02) translate(0, 0); }
            50% { transform: scale(1.02) translate(-2px, 2px); }
        }
        
        #particle-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2; pointer-events: none;
        }

        #weather-overlay-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 3; pointer-events: none;
        }

        .floating-overlay {
            position: absolute;
            filter: drop-shadow(8px 8px 0px rgba(0,0,0,0.5)) grayscale(20%) sepia(30%);
            will-change: transform;
        }

        #character-layer {
            position: absolute;
            bottom: 6%; 
            left: 5%; 
            z-index: 4;
            transition: all 0.5s ease-in-out;
            pointer-events: none;
        }

        #characters {
            height: 30vh; 
            filter: drop-shadow(10px 10px 0px rgba(0,0,0,0.5)) grayscale(20%) sepia(30%);
            animation: bounce 2.5s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        #fog-layer {
            position: absolute;
            top: 0; left: 0; width: 300%; height: 100%;
            background: 
                radial-gradient(ellipse at 10% 50%, rgba(200, 200, 200, 0.3) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 60%, rgba(200, 200, 200, 0.4) 0%, transparent 70%),
                radial-gradient(ellipse at 80% 40%, rgba(200, 200, 200, 0.2) 0%, transparent 50%),
                radial-gradient(ellipse at 30% 70%, rgba(200, 200, 200, 0.3) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 30%, rgba(200, 200, 200, 0.4) 0%, transparent 70%);
            background-size: 50% 100%, 40% 80%, 60% 120%, 45% 90%, 55% 110%;
            opacity: 0; z-index: 5; pointer-events: none; /* Make sure fog doesn't block clicks */
            transition: opacity 3s ease-in-out;
            animation: fogDrift 45s linear infinite;
            filter: blur(15px);
        }

        @keyframes fogDrift {
            0% { transform: translateX(0); }
            100% { transform: translateX(-33.33%); }
        }

        #info-plaque {
            position: absolute;
            top: 25px; right: 25px; 
            background: #e6dfcc;
            background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png');
            color: #1a1a1a;
            padding: 15px 30px;
            border: 5px solid #000;
            border-radius: 15px;
            z-index: 30;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.6);
            display: flex; flex-direction: column; gap: 5px;
            transform: rotate(2deg);
        }

        #time-display { font-size: 20px; font-weight: bold; border-bottom: 3px dashed #000; padding-bottom: 8px; margin-bottom: 5px; }
        #temp-display { font-size: 42px; font-weight: bold; letter-spacing: -2px; }
        #desc-display { font-size: 16px; font-weight: bold; }
        .error-box { color: #cc0000; font-size: 12px; margin-top: 5px; font-weight: bold; }

        /* Links Dock - Grouped Layout */
        #links-dock {
            position: fixed;
            bottom: 0; z-index: 20; width: 100%; height: 45vh; 
            background: rgba(25, 25, 25, 0.95);
            background-image: url('https://www.transparenttextures.com/patterns/old-wall.png');
            backdrop-filter: blur(10px);
            border-top: 6px solid #000;
            display: flex; flex-direction: column; align-items: center; 
            overflow-y: auto; overflow-x: hidden;
            padding: 20px; box-sizing: border-box;
            box-shadow: inset 0 20px 30px -10px rgba(0,0,0,0.9);
            gap: 20px;
        }

        #links-dock::-webkit-scrollbar { width: 16px; }
        #links-dock::-webkit-scrollbar-track { background: #1a1a1a; border-left: 3px solid #000; }
        #links-dock::-webkit-scrollbar-thumb { background: #333; border: 3px solid #000; border-radius: 8px;}
        #links-dock::-webkit-scrollbar-thumb:hover { background: #555; }

        .dock-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 15px;
            border: 3px dashed transparent;
            background: transparent;
            position: relative;
            width: 100%;
        }

        .group-label {
            display: none;
            position: absolute;
            top: -15px;
            left: 30px;
            background: #1a1a1a;
            color: #e0d5c1;
            padding: 0 10px;
            font-size: 18px;
            font-weight: bold;
            border: 2px solid #444;
            border-radius: 5px;
            letter-spacing: 2px;
        }

        /* Order for small screens: Homelab first */
        .group-homelab { order: 1; }
        .group-google { order: 2; }
        .group-proton { order: 3; }
        .group-misc { order: 4; }

        /* Layout for large screens */
        @media (min-width: 1024px) {
            #links-dock {
                flex-direction: row;
                align-items: flex-start;
                justify-content: center;
                gap: 30px;
                padding: 40px 20px;
            }
            .dock-group {
                border-color: #444;
                background: rgba(0,0,0,0.2);
                border-radius: 15px;
                padding: 30px 20px 20px;
                width: auto;
                max-width: 800px;
                /* Reset order for large screens */
                order: initial !important; 
            }
            .group-label {
                display: block;
            }
        }

        .app-link {
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            flex-shrink: 0; position: relative;
            background: #fff; border-radius: 20px; border: 4px solid #000; padding: 8px;
            box-shadow: 6px 6px 0px rgba(0,0,0,0.5);
        }

        .app-link::after {
            content: attr(data-title);
            position: absolute; bottom: -35px; left: 50%; transform: translateX(-50%);
            color: #e0d5c1; font-size: 16px; font-weight: bold;
            text-shadow: 2px 2px 0px #000; opacity: 0; transition: opacity 0.2s;
            pointer-events: none; white-space: nowrap; letter-spacing: 2px;
        }

        .app-link:hover { transform: scale(1.1) translateY(-5px); box-shadow: 10px 10px 0px rgba(0,0,0,0.6); }
        .app-link:hover::after { opacity: 1; }
        .app-icon { width: 110px; height: 110px; object-fit: contain; border-radius: 12px; transition: all 0.4s ease; }

        #debug-container {
            position: absolute;
            bottom: 25px;
            right: 25px;
            z-index: 1000; /* Increased z-index to stay above everything, including fog */
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            pointer-events: auto; /* Ensure it catches clicks */
        }

        #debug-menu {
            display: none; 
            background: #e6dfcc;
            background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png');
            border: 4px solid #000;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.6);
            width: 200px;
        }

        #debug-menu h3 { margin: 0 0 10px 0; border-bottom: 2px dashed #000; padding-bottom: 5px; text-align: center; font-size: 16px;}
        #debug-menu button {
            display: block; width: 100%; margin-bottom: 6px; padding: 6px;
            background: #fff; border: 2px solid #000; font-family: 'Special Elite', monospace;
            font-weight: bold; cursor: pointer; transition: 0.2s; border-radius: 4px;
        }
        #debug-menu button:hover { background: #1a1a1a; color: #fff; transform: translateX(-3px); box-shadow: 4px 4px 0px rgba(0,0,0,0.4); }
        
        .debug-resume { background: #d9534f !important; color: #fff; border-color: #000 !important; margin-top: 10px; }
        .debug-resume:hover { background: #c9302c !important; }

        #debug-gear {
            width: 50px; height: 50px; background: #e6dfcc; border: 4px solid #000;
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 28px; cursor: pointer; box-shadow: 6px 6px 0px rgba(0,0,0,0.6);
            transition: transform 0.3s ease;
        }
        #debug-gear:hover { transform: rotate(45deg) scale(1.1); }
    </style>
</head>

    <script>
        const ASSETS = {
            bgChilly: "Background_35-59°F (Chilly).jpeg",
            bgMild: "Background_60-69°F (Mild).jpeg",
            bgWarm: "Background_70-79°F (Warm).jpg",
            bgHeatwave: "Background_80°F+ (Heatwave).png", 
            charFreezing: "Character Sprite_35°F (Freezing).png",
            charChilly: "Character Sprite_35-59°F (Chilly).png",
            charMild: "Character Sprite_60-69°F (Mild).png",
            charWarm: "Character Sprite_70-79°F (Warm).png",
            charHeatwave: "Character Sprite_80°F+ (Heatwave).png",
            overlayHail: "Weather Overlay_Hail.png"
        };

        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let weatherEntities = []; 
        let weatherType = 'clear';
        let isTestingMode = false; 

        function resizeCanvas() {
            const stage = document.getElementById('stage');
            canvas.width = stage.clientWidth;
            canvas.height = stage.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(type, fromCloud = false) {
                this.type = type;
                this.fromCloud = fromCloud;
                this.reset(true);
            }
            reset(isInit = false) {
                if (this.type === 'debris') {
                    const tornados = weatherEntities.filter(e => e.type === 'tornado');
                    if (tornados.length > 0) {
                        const t = tornados[Math.floor(Math.random() * tornados.length)];
                        const tWidth = canvas.width * (t.scale * 0.25); 
                        this.x = t.x + (tWidth / 2) + (Math.random() * 100 - 50);
                        this.y = canvas.height + (Math.random() * 50);
                        this.speed = -(Math.random() * 12 + 4); 
                        this.wind = Math.random() * 14 - 7; 
                        this.size = Math.random() * 8 + 3;
                    } else {
                        this.y = -100; 
                    }
                } else if (this.fromCloud) {
                    const clouds = weatherEntities.filter(e => e.type === 'cloud');
                    if (clouds.length > 0) {
                        const c = clouds[Math.floor(Math.random() * clouds.length)];
                        // Spread particles across the width of the cloud
                        const cWidth = (canvas.width / 100) * (25 * c.scale);
                        this.x = c.x + (Math.random() * cWidth);
                        
                        // Start particle inside the visual cloud bounds
                        // Getting the exact bounds is hard without querying the DOM,
                        // so we approximate based on the cloud's top % and the screen height.
                        // Assuming the cloud graphic takes up roughly 15-20% of the screen height.
                        const cloudTopPx = (parseFloat(c.el.style.top) / 100) * canvas.height;
                        const cloudBottomPx = cloudTopPx + (canvas.height * 0.15 * c.scale); 

                        if (isInit) {
                            // On init, spread from inside the cloud down to the bottom
                            this.y = cloudTopPx + (Math.random() * (canvas.height - cloudTopPx));
                        } else {
                            // On reset, spawn somewhere inside the "fluffy" part of the cloud
                            this.y = cloudTopPx + (Math.random() * (cloudBottomPx - cloudTopPx)); 
                        }
                    } else {
                        this.x = Math.random() * canvas.width;
                        if (isInit) {
                           this.y = Math.random() * canvas.height; 
                        } else {
                           this.y = Math.random() * -50 - 20;
                        }
                    }
                } else {
                     this.x = Math.random() * canvas.width;
                     if (isInit) {
                           this.y = Math.random() * canvas.height; 
                     } else {
                           this.y = Math.random() * -50 - 20;
                     }
                }

                if (this.type !== 'debris') {
                    this.speed = (this.type === 'snow') ? Math.random() * 2 + 1 : Math.random() * 10 + 8;
                    this.size = (this.type === 'hail') ? Math.random() * 6 + 4 : Math.random() * 3 + 2;
                    this.wind = Math.random() * 3 - 1.5;
                }
            }
            update() {
                this.y += this.speed;
                this.x += this.wind;
                
                if (this.type === 'debris') {
                    if (this.y < canvas.height - 300) this.reset(); 
                } else {
                    if (this.y > canvas.height) this.reset();
                }
            }
            draw() {
                ctx.beginPath();
                if (this.type === 'rain') {
                    // Increased opacity and width for better visibility
                    ctx.strokeStyle = 'rgba(200, 200, 200, 0.95)';
                    ctx.lineWidth = 4;
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(this.x + (this.wind * 2), this.y + 25);
                    ctx.stroke();
                } else if (this.type === 'debris') {
                    ctx.fillStyle = 'rgba(120, 110, 90, 0.9)'; 
                    ctx.fillRect(this.x, this.y, this.size, this.size);
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(this.x, this.y, this.size, this.size);
                } else {
                    // Increased opacity and added a slightly thicker stroke for snow/hail
                    ctx.fillStyle = 'rgba(230, 230, 230, 0.95)';
                    // Make snow slightly larger so it's easier to see
                    const drawSize = this.type === 'snow' ? this.size * 1.5 : this.size;
                    ctx.arc(this.x, this.y, drawSize, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                }
            }
        }

        function initParticles(type) {
            particles = [];
            
            if (type === 'debris') {
                for (let i = 0; i < 150; i++) particles.push(new Particle(type));
            } else if (['rain', 'snow', 'hail'].includes(type)) {
                // Increased the total count for all weather types
                let totalCount = (type === 'rain') ? 500 : (type === 'snow') ? 400 : 250;
                
                // Keep the ratio: 40% general, 60% dropping from clouds
                let generalCount = Math.floor(totalCount * 0.4); 
                let cloudCount = totalCount - generalCount;
                
                for (let i = 0; i < generalCount; i++) particles.push(new Particle(type, false));
                for (let i = 0; i < cloudCount; i++) particles.push(new Particle(type, true));
            }
        }
            

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            weatherEntities.forEach(ent => {
                ent.x += ent.speed;
                if (ent.x > window.innerWidth + 300) {
                    ent.x = -400; 
                }
                ent.el.style.transform = `translateX(${ent.x}px)`;
            });

            if (['rain', 'snow', 'hail', 'debris'].includes(weatherType)) {
                particles.forEach(p => { p.update(); p.draw(); });
            }
            requestAnimationFrame(animate);
        }
        animate();

        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            
            hours = hours % 12;
            hours = hours ? hours : 12; 
            minutes = minutes < 10 ? '0' + minutes : minutes;
            seconds = seconds < 10 ? '0' + seconds : seconds;
            
            document.getElementById('time-display').innerText = hours + ':' + minutes + ':' + seconds + ' ' + ampm;
        }
        setInterval(updateClock, 1000);
        updateClock();

        function spawnEntity(layer, src, yPos, scale, speed, type) {
            let img = document.createElement('img');
            img.src = src;
            img.className = 'floating-overlay';
            img.style.width = Math.floor(25 * scale) + 'vw';
            img.style.top = yPos + '%';
            
            let startX = Math.random() * window.innerWidth;
            img.style.transform = `translateX(${startX}px)`;
            
            layer.appendChild(img);
            
            weatherEntities.push({
                el: img,
                x: startX,
                speed: speed,
                scale: scale,
                type: type
            });
        }

        function renderDashboardState(temp, weatherDesc, isTest = false) {
            document.getElementById('temp-display').innerText = temp + (isTest ? '°F (TEST)' : '°F');
            document.getElementById('desc-display').innerText = weatherDesc;

            let bgFile = '';
            let charFile = '';

            if (temp >= 80) {
                bgFile = ASSETS.bgHeatwave;
                charFile = ASSETS.charHeatwave;
            } else if (temp >= 70) {
                bgFile = ASSETS.bgWarm;
                charFile = ASSETS.charWarm;
            } else if (temp >= 60) {
                bgFile = ASSETS.bgMild;
                charFile = ASSETS.charMild; 
            } else if (temp >= 35) {
                bgFile = ASSETS.bgChilly;
                charFile = ASSETS.charChilly;
            } else {
                bgFile = ASSETS.bgChilly; 
                charFile = ASSETS.charFreezing;
            }

            document.getElementById('background-layer').style.backgroundImage = `url('${bgFile}')`;
            document.getElementById('characters').src = charFile;

            const overlayLayer = document.getElementById('weather-overlay-layer');
            const fogLayer = document.getElementById('fog-layer');
            overlayLayer.innerHTML = '';
            fogLayer.style.opacity = '0';
            weatherEntities = []; 
            weatherType = 'clear';

            const descStr = weatherDesc.toLowerCase();
            
            if (descStr.includes('tornado')) {
                weatherType = 'debris';
                spawnEntity(overlayLayer, 'Weather Overlay_Tornado.png', -10, 1.4, 2.5, 'tornado');
                spawnEntity(overlayLayer, 'Weather Overlay_Tornado.png', 5, 0.9, 1.8, 'tornado');
                spawnEntity(overlayLayer, 'Weather Overlay_Tornado.png', -5, 1.8, 3.2, 'tornado');
                initParticles('debris');
                
            } else if (descStr.includes('rain')) {
                weatherType = 'rain';
                spawnEntity(overlayLayer, 'Weather Overlay_Rain.png', -5, 0.7, 0.6, 'cloud');
                spawnEntity(overlayLayer, 'Weather Overlay_Rain.png', 2, 0.5, 0.4, 'cloud');
                spawnEntity(overlayLayer, 'Weather Overlay_Rain.png', -10, 0.85, 0.8, 'cloud');
                initParticles('rain');
                
            } else if (descStr.includes('snow')) {
                weatherType = 'snow';
                spawnEntity(overlayLayer, 'Weather Overlay_Snow.png', -5, 0.75, 0.5, 'cloud');
                spawnEntity(overlayLayer, 'Weather Overlay_Snow.png', -2, 0.55, 0.3, 'cloud');
                initParticles('snow');
                
            } else if (descStr.includes('hail')) {
                weatherType = 'hail';
                spawnEntity(overlayLayer, ASSETS.overlayHail, -8, 0.85, 0.7, 'cloud');
                spawnEntity(overlayLayer, ASSETS.overlayHail, 0, 0.6, 0.5, 'cloud');
                initParticles('hail');
                
            } else if (descStr.includes('fog') || descStr.includes('mist')) {
                fogLayer.style.opacity = '0.7';
            }
        }

        async function fetchLiveDashboard() {
            if (isTestingMode) return; 

            const errorDisplay = document.getElementById('error-display');
            try {
                const response = await fetch('weather.json?t=' + new Date().getTime());
                if (!response.ok) throw new Error('Data Sync Missing');
                
                const data = await response.json();
                errorDisplay.innerText = '';
                renderDashboardState(parseInt(data.temp), data.weather, false);

            } catch (err) {
                errorDisplay.innerText = 'TELGRAPH OFFLINE';
            }
        }

        fetchLiveDashboard();
        setInterval(fetchLiveDashboard, 60000);

        function toggleDebugMenu() {
            const menu = document.getElementById('debug-menu');
            menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
        }

        function forceWeather(temp, desc) {
            isTestingMode = true; 
            document.getElementById('error-display').innerText = 'TEST MODE ACTIVE';
            document.getElementById('error-display').style.color = '#ff8800';
            document.getElementById('error-display').style.borderTopColor = '#ff8800';
            renderDashboardState(temp, desc, true);
        }

        function resumeLiveWeather() {
            isTestingMode = false;
            document.getElementById('error-display').style.color = '#cc0000';
            document.getElementById('error-display').style.borderTopColor = '#cc0000';
            document.getElementById('error-display').innerText = '';
            document.getElementById('temp-display').innerText = 'WAITING...';
            document.getElementById('debug-menu').style.display = 'none';
            fetchLiveDashboard(); 
        }

    </script>
</body>
</html>
