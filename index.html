<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lazy's 1930s Dashboard</title>
    <!-- Adding a vintage typewriter font for authentic 1930s feel -->
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a1a; /* Darker, slightly warmer base */
            font-family: 'Special Elite', 'Courier New', Courier, monospace;
        }

        /* Subtle 1930s Film Grain Overlay */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.35; /* Slightly increased for more visible vintage texture */
            pointer-events: none;
            z-index: 9999;
            animation: filmGrain 8s steps(10) infinite;
        }

        @keyframes filmGrain {
            0%, 100% { background-position: 0 0; }
            50% { background-position: 10px 10px; }
        }

        #dashboard-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
        }

        /* Stage pinned to top - fixed height */
        #stage {
            position: relative;
            width: 100%;
            height: 55vh; 
            overflow: hidden;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            box-shadow: inset 0 -15px 40px rgba(0,0,0,0.9); /* Deeper shadow for depth */
            border-bottom: 4px solid #000; /* Bold illustrative border */
        }

        /* Layer 1: Background - Stabilized with very subtle jostle */
        #background-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover; 
            background-repeat: no-repeat;
            background-position: center center;
            transition: background-image 1s ease-in-out;
            z-index: 1;
            animation: jostle 20s ease-in-out infinite;
            filter: grayscale(80%) sepia(40%) contrast(120%) brightness(90%); /* Heavy Rubber Hose Filter */
        }

        @keyframes jostle {
            0%, 100% { transform: scale(1.02) translate(0, 0); }
            50% { transform: scale(1.02) translate(-2px, 2px); }
        }

        /* Layer 2: Weather Overlays */
        #weather-overlay-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            z-index: 2;
            pointer-events: none;
        }

        .weather-sprite {
            width: 18%;
            max-width: 220px;
            margin-top: 1%;
            filter: drop-shadow(0 0 15px rgba(0,0,0,0.6));
        }

        /* Layer 3: Characters */
        #character-layer {
            position: absolute;
            bottom: 6%; 
            left: 5%; /* Moved slightly right */
            z-index: 3;
            transition: all 0.5s ease-in-out;
            pointer-events: none;
        }

        #characters {
            height: 30vh; /* Slightly larger characters based on reference */
            filter: drop-shadow(10px 10px 0px rgba(0,0,0,0.5)) grayscale(20%) sepia(30%); /* Harder, offset shadow for 2D feel */
            animation: bounce 2.5s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); } /* More exaggerated bounce */
        }

        #characters {
            height: 25vh; 
            filter: drop-shadow(8px 8px 15px rgba(0,0,0,0.8)) sepia(20%);
            animation: bounce 2.5s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* Layer 4 & 5: Particles and Fog */
        #particle-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 4; pointer-events: none;
        }

        #fog-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/fog.png');
            opacity: 0; z-index: 5; pointer-events: none;
            transition: opacity 3s ease-in-out;
            animation: fogDrift 60s linear infinite;
        }

        @keyframes fogDrift {
            0% { background-position: 0 0; }
            100% { background-position: 1000px 0; }
        }

        /* UI: Links Dock */
        #links-dock {
            position: fixed;
            bottom: 0;
            z-index: 20;
            width: 100%;
            height: 45vh; 
            background: rgba(25, 25, 25, 0.95); /* Solid, dark vintage grey */
            background-image: url('https://www.transparenttextures.com/patterns/old-wall.png'); /* Texture overlay */
            backdrop-filter: blur(10px);
            border-top: 6px solid #000; /* Thick black line for cartoon style */
            display: flex;
            justify-content: center;
            align-content: flex-start; 
            flex-wrap: wrap; 
            gap: 35px; /* Slightly more spacing */
            overflow-y: auto;
            padding: 50px 40px;
            box-sizing: border-box;
            box-shadow: inset 0 20px 30px -10px rgba(0,0,0,0.9);
        }

        /* Custom Scrollbar for the dock */
        #links-dock::-webkit-scrollbar { width: 16px; } /* Thicker scrollbar */
        #links-dock::-webkit-scrollbar-track { background: #1a1a1a; border-left: 3px solid #000; }
        #links-dock::-webkit-scrollbar-thumb { background: #333; border: 3px solid #000; border-radius: 8px;} /* Cartoonish thumb */
        #links-dock::-webkit-scrollbar-thumb:hover { background: #555; }

        .app-link {
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            flex-shrink: 0;
            position: relative;
            background: #fff; /* White base for icons to pop against */
            border-radius: 20px;
            border: 4px solid #000; /* Thick black border for icons */
            padding: 5px;
            box-shadow: 6px 6px 0px rgba(0,0,0,0.5); /* Hard block shadow */
        }

        .app-link::after {
            content: attr(data-title);
            position: absolute;
            bottom: -35px;
            left: 50%;
            transform: translateX(-50%);
            color: #e0d5c1; /* Aged paper color */
            font-size: 14px;
            font-weight: bold;
            text-shadow: 2px 2px 0px #000; /* Hard shadow on text */
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            white-space: nowrap;
            letter-spacing: 2px;
        }

        .app-link:hover {
            transform: scale(1.1) translateY(-5px);
            box-shadow: 10px 10px 0px rgba(0,0,0,0.6); /* Extended shadow on hover */
        }

        .app-link:hover::after { opacity: 1; }

        /* Icon styling - sepia by default, full color on hover */
        .app-icon { 
            width: 90px; 
            height: 90px; 
            object-fit: contain;
            border-radius: 12px;
            filter: grayscale(100%) sepia(30%) contrast(150%); /* High contrast vintage look */
            transition: all 0.4s ease;
        }

        .app-link:hover .app-icon { 
            filter: grayscale(0%) sepia(0%); /* Remove filter on hover */
        }

        /* UI: Weather Info Plaque */
        #info-plaque {
            position: absolute;
            top: 25px;
            right: 25px; 
            background: #e6dfcc; /* Light aged paper background */
            background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png');
            color: #1a1a1a; /* Dark text for contrast */
            padding: 15px 30px;
            border: 5px solid #000; /* Bold cartoon border */
            border-radius: 15px; /* Rounded corners */
            z-index: 30;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center; /* Centered text */
            box-shadow: 8px 8px 0px rgba(0,0,0,0.6); /* Hard block shadow */
            display: flex;
            flex-direction: column;
            gap: 5px;
            transform: rotate(2deg); /* Slight jaunty angle */
        }

        #time-display { font-size: 20px; font-weight: bold; border-bottom: 3px dashed #000; padding-bottom: 8px; margin-bottom: 5px; }
        #temp-display { font-size: 42px; font-weight: bold; text-shadow: none; letter-spacing: -2px; } /* Removed shadow, tighter spacing */
        #desc-display { font-size: 16px; font-weight: bold; }
        .error-box { color: #cc0000; font-size: 12px; margin-top: 5px; font-weight: bold; border-top: 2px solid #cc0000; padding-top: 5px;}
            <div id="fog-layer"></div>

            <div id="info-plaque">
                <div id="time-display">--:--:--</div>
                <div id="temp-display">WAITING...</div>
                <div id="desc-display">---</div>
                <div id="error-display" class="error-box"></div>
            </div>
        </div>

        <div id="links-dock">
            <!-- Added data-title attributes for cool vintage hover tooltips -->
            <a href="https://mail.google.com" target="_blank" class="app-link" data-title="Gmail"><img src="gmail.png" alt="Gmail" class="app-icon"></a>
            <a href="https://youtube.com" target="_blank" class="app-link" data-title="YouTube"><img src="youtube.png" alt="YouTube" class="app-icon"></a>
            <a href="https://drive.google.com" target="_blank" class="app-link" data-title="Drive"><img src="googleDrive.png" alt="Drive" class="app-icon"></a>
            <a href="https://calendar.google.com" target="_blank" class="app-link" data-title="Calendar"><img src="googleCalendar.png" alt="Calendar" class="app-icon"></a>
            <a href="https://messages.google.com" target="_blank" class="app-link" data-title="Messages"><img src="messages.png" alt="Messages" class="app-icon"></a>
            <a href="https://notebooklm.google.com" target="_blank" class="app-link" data-title="NotebookLM"><img src="noteBookLM.png" alt="Notebook" class="app-icon"></a>
            <a href="https://web.stremio.com" target="_blank" class="app-link" data-title="Stremio"><img src="stremio.png" alt="Stremio" class="app-icon"></a>
            <a href="https://www.cheapshark.com" target="_blank" class="app-link" data-title="CheapShark"><img src="cheapShark.png" alt="CheapShark" class="app-icon"></a>
            <a href="http://192.168.40.149:9443" target="_blank" class="app-link" data-title="Portainer"><img src="portainer.png" alt="Portainer" class="app-icon"></a>
            <a href="http://192.168.40.149:8096" target="_blank" class="app-link" data-title="Jellyfin"><img src="Jellyfin.png" alt="Jellyfin" class="app-icon"></a>
            <a href="http://192.168.40.149:3001" target="_blank" class="app-link" data-title="Local AI"><img src="Ilm.png" alt="Local AI" class="app-icon"></a>
            <a href="https://mail.proton.me" target="_blank" class="app-link" data-title="ProtonMail"><img src="protonMail.png" alt="ProtonMail" class="app-icon"></a>
            <a href="https://drive.proton.me" target="_blank" class="app-link" data-title="ProtonDrive"><img src="protonDrive.png" alt="ProtonDrive" class="app-icon"></a>
            <a href="https://calendar.proton.me" target="_blank" class="app-link" data-title="ProtonCalendar"><img src="protonCalendar.png" alt="ProtonCalendar" class="app-icon"></a>
            <a href="https://www.nerdwallet.com" target="_blank" class="app-link" data-title="NerdWallet"><img src="nerdWallet.png" alt="NerdWallet" class="app-icon"></a>
            <a href="https://cad.onshape.com" target="_blank" class="app-link" data-title="OnShape"><img src="onShape.png" alt="OnShape" class="app-icon"></a>
            <a href="https://www.photopea.com" target="_blank" class="app-link" data-title="PhotoPea"><img src="photoPea.png" alt="PhotoPea" class="app-icon"></a>
            <a href="https://lemmy.world" target="_blank" class="app-link" data-title="Lemmy"><img src="lemmy.png" alt="Lemmy" class="app-icon"></a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let weatherType = 'clear';

        function resizeCanvas() {
            const stage = document.getElementById('stage');
            canvas.width = stage.clientWidth;
            canvas.height = stage.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(type) {
                this.type = type;
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * -canvas.height;
                this.speed = (this.type === 'snow') ? Math.random() * 2 + 1 : Math.random() * 10 + 8; /* Faster precipitation */
                this.size = (this.type === 'hail') ? Math.random() * 6 + 4 : Math.random() * 3 + 2; /* Larger particles */
                this.wind = Math.random() * 3 - 1.5; /* More wind */
            }
            update() {
                this.y += this.speed;
                this.x += this.wind;
                if (this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.beginPath();
                if (this.type === 'rain') {
                    ctx.strokeStyle = 'rgba(200, 200, 200, 0.8)'; /* More solid lines for rain */
                    ctx.lineWidth = 3;
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(this.x + (this.wind * 2), this.y + 25); /* Longer rain streaks */
                    ctx.stroke();
                } else {
                    ctx.fillStyle = 'rgba(230, 230, 230, 0.9)'; /* More solid white for snow/hail */
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#000'; /* Outline for particles */
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            }
        }

        function initParticles(type) {
            particles = [];
            let count = (type === 'rain') ? 200 : (type === 'snow') ? 120 : 70;
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(type));
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (['rain', 'snow', 'hail'].includes(weatherType)) {
                particles.forEach(p => { p.update(); p.draw(); });
            }
            requestAnimationFrame(animate);
        }
        animate();

        // Live Clock Functionality
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            
            hours = hours % 12;
            hours = hours ? hours : 12; // the hour '0' should be '12'
            minutes = minutes < 10 ? '0' + minutes : minutes;
            seconds = seconds < 10 ? '0' + seconds : seconds;
            
            const timeString = hours + ':' + minutes + ':' + seconds + ' ' + ampm;
            document.getElementById('time-display').innerText = timeString;
        }
        setInterval(updateClock, 1000);
        updateClock(); // Initial call

        // Weather Fetching Logic
        async function updateDashboard() {
            const errorDisplay = document.getElementById('error-display');
            try {
                const response = await fetch('weather.json?t=' + new Date().getTime());
                if (!response.ok) throw new Error('Data Sync Missing');
                
                const data = await response.json();
                const temp = parseInt(data.temp);
                const weatherDesc = data.weather.toLowerCase();

                document.getElementById('temp-display').innerText = temp + '°F';
                document.getElementById('desc-display').innerText = weatherDesc;
                errorDisplay.innerText = '';

                let bgFile = '';
                let charFile = '';

                if (temp >= 80) {
                    bgFile = 'Background_80°F+ (Heatwave).png';
                    charFile = 'Character Sprite_80°F+ (Heatwave).png';
                } else if (temp >= 70) {
                    bgFile = 'Background_70-79°F (Warm).jpg';
                    charFile = 'Character Sprite_70-79°F (Warm).png';
                } else if (temp >= 60) {
                    bgFile = 'Background_60-69°F (Mild).jpeg';
                    charFile = 'Character Sprite_60-69°F (Mild).png';
                } else if (temp >= 35) {
                    bgFile = 'Background_35-59°F (Chilly).jpeg';
                    charFile = 'Character Sprite_35-59°F (Chilly).png';
                } else {
                    bgFile = 'Background_35-59°F (Chilly).jpeg';
                    charFile = 'Character Sprite_35°F (Freezing).png';
                }

                document.getElementById('background-layer').style.backgroundImage = `url('${encodeURIComponent(bgFile)}')`;
                document.getElementById('characters').src = encodeURIComponent(charFile);

                const overlayLayer = document.getElementById('weather-overlay-layer');
                const fogLayer = document.getElementById('fog-layer');
                overlayLayer.innerHTML = '';
                fogLayer.style.opacity = '0';
                weatherType = 'clear';

                if (weatherDesc.includes('rain')) {
                    weatherType = 'rain';
                    overlayLayer.innerHTML = `<img src="${encodeURIComponent('Weather Overlay_Rain.png')}" class="weather-sprite">`;
                    initParticles('rain');
                } else if (weatherDesc.includes('snow')) {
                    weatherType = 'snow';
                    overlayLayer.innerHTML = `<img src="${encodeURIComponent('Weather Overlay_Snow.png')}" class="weather-sprite">`;
                    initParticles('snow');
                } else if (weatherDesc.includes('hail')) {
                    weatherType = 'hail';
                    overlayLayer.innerHTML = `<img src="${encodeURIComponent('Weather Overlay_Hail.png')}" class="weather-sprite">`;
                    initParticles('hail');
                } else if (weatherDesc.includes('fog') || weatherDesc.includes('mist')) {
                    fogLayer.style.opacity = '0.7';
                } else if (weatherDesc.includes('tornado')) {
                    overlayLayer.innerHTML = `<img src="${encodeURIComponent('Weather Overlay_Tornado.png')}" class="weather-sprite">`;
                }

            } catch (err) {
                errorDisplay.innerText = 'TELGRAPH OFFLINE';
            }
        }

        updateDashboard();
        setInterval(updateDashboard, 60000);
    </script>
</body>
</html>
