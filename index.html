<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lazy's 1930s Dashboard</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a1a;
            font-family: 'Courier New', Courier, monospace;
        }

        #dashboard-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Layer 1: Background */
        #background-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: background-image 1s ease-in-out;
            z-index: 1;
        }

        /* Layer 2: Weather Overlays (Sprites) */
        #weather-overlay-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            z-index: 2;
            pointer-events: none;
        }

        .weather-sprite {
            width: 350px;
            margin-top: 10px;
            filter: drop-shadow(0 0 15px rgba(0,0,0,0.5));
        }

        /* Layer 3: Characters */
        #character-layer {
            position: absolute;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            transition: all 0.5s ease-in-out;
        }

        #characters {
            height: 480px;
            filter: drop-shadow(5px 5px 15px rgba(0,0,0,0.8));
            animation: bounce 2.5s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        /* Layer 4: Particles (Rain/Snow/Hail) */
        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 4;
            pointer-events: none;
        }

        /* Layer 5: Fog Effect (Over everything) */
        #fog-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 200%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/fog.png');
            opacity: 0;
            z-index: 5;
            pointer-events: none;
            animation: fogMove 45s linear infinite;
            transition: opacity 3s ease-in-out;
        }

        @keyframes fogMove {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        /* UI Elements */
        #weather-info {
            position: absolute;
            top: 25px;
            left: 25px;
            background: rgba(20, 20, 20, 0.85);
            color: #efefef;
            padding: 20px;
            border-radius: 4px;
            border: 3px double #777;
            z-index: 10;
            text-transform: uppercase;
            letter-spacing: 3px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .error-box {
            color: #ff6666;
            font-size: 11px;
            margin-top: 8px;
            text-transform: none;
            letter-spacing: 0;
        }
    </style>
</head>
<body>

    <div id="dashboard-container">
        <div id="background-layer"></div>
        <div id="weather-overlay-layer"></div>
        <div id="character-layer">
            <img id="characters" src="" alt="The Duo">
        </div>
        <canvas id="particle-canvas"></canvas>
        <div id="fog-layer"></div>

        <div id="weather-info">
            <div id="temp-display">WAITING...</div>
            <div id="desc-display">---</div>
            <div id="error-display" class="error-box"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let weatherType = 'clear';

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(type) {
                this.type = type;
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * -canvas.height;
                this.speed = (this.type === 'snow') ? Math.random() * 1.5 + 0.8 : Math.random() * 6 + 6;
                this.size = (this.type === 'hail') ? Math.random() * 5 + 3 : Math.random() * 2 + 1;
                this.wind = Math.random() * 2 - 1;
            }
            update() {
                this.y += this.speed;
                this.x += this.wind;
                if (this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.beginPath();
                if (this.type === 'rain') {
                    ctx.strokeStyle = 'rgba(200, 220, 255, 0.4)';
                    ctx.lineWidth = 1;
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(this.x + (this.wind * 2), this.y + 12);
                    ctx.stroke();
                } else {
                    ctx.fillStyle = (this.type === 'hail') ? 'rgba(220, 220, 220, 0.9)' : 'rgba(255, 255, 255, 0.85)';
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function initParticles(type) {
            particles = [];
            let count = (type === 'rain') ? 200 : (type === 'snow') ? 120 : 60;
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(type));
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (['rain', 'snow', 'hail'].includes(weatherType)) {
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
            }
            requestAnimationFrame(animate);
        }
        animate();

        async function updateDashboard() {
            const errorDisplay = document.getElementById('error-display');
            try {
                const response = await fetch('weather.json?nocache=' + new Date().getTime());
                if (!response.ok) throw new Error('Cannot reach weather.json');
                
                const data = await response.json();
                const temp = parseInt(data.temp);
                const weatherDesc = data.weather.toLowerCase();

                document.getElementById('temp-display').innerText = temp + '°F';
                document.getElementById('desc-display').innerText = weatherDesc;
                errorDisplay.innerText = '';

                // Asset Mapping based on GitHub underscore naming
                let bgFile = '';
                let charFile = '';

                if (temp >= 80) {
                    bgFile = 'Background_80°F+ (Heatwave).png';
                    charFile = 'Character Sprite_80°F+ (Heatwave).png';
                } else if (temp >= 70) {
                    bgFile = 'Background_70-79°F (Warm).jpg';
                    charFile = 'Character Sprite_70-79°F (Warm).png';
                } else if (temp >= 60) {
                    bgFile = 'Background_60-69°F (Mild).jpeg';
                    charFile = 'Character Sprite_60-69°F (Mild).png';
                } else if (temp >= 35) {
                    bgFile = 'Background_35-59°F (Chilly).jpeg';
                    charFile = 'Character Sprite_35-59°F (Chilly).png';
                } else {
                    bgFile = 'Background_35-59°F (Chilly).jpeg';
                    charFile = 'Character Sprite_35°F (Freezing).png'; // <35 became 35 in GitHub rename
                }

                document.getElementById('background-layer').style.backgroundImage = `url('${encodeURIComponent(bgFile)}')`;
                document.getElementById('characters').src = encodeURIComponent(charFile);

                // Weather Overlay & Logic
                const overlayLayer = document.getElementById('weather-overlay-layer');
                const fogLayer = document.getElementById('fog-layer');
                
                overlayLayer.innerHTML = '';
                fogLayer.style.opacity = '0';
                weatherType = 'clear';

                // Particle & Overlay Switching
                if (weatherDesc.includes('rain')) {
                    weatherType = 'rain';
                    overlayLayer.innerHTML = `<img src="${encodeURIComponent('Weather Overlay_Rain.png')}" class="weather-sprite">`;
                    initParticles('rain');
                } else if (weatherDesc.includes('snow')) {
                    weatherType = 'snow';
                    overlayLayer.innerHTML = `<img src="${encodeURIComponent('Weather Overlay_Snow.png')}" class="weather-sprite">`;
                    initParticles('snow');
                } else if (weatherDesc.includes('hail')) {
                    weatherType = 'hail';
                    overlayLayer.innerHTML = `<img src="${encodeURIComponent('Weather Overlay_Hail.png')}" class="weather-sprite">`;
                    initParticles('hail');
                } else if (weatherDesc.includes('fog') || weatherDesc.includes('mist')) {
                    fogLayer.style.opacity = '0.6';
                } else if (weatherDesc.includes('tornado')) {
                    overlayLayer.innerHTML = `<img src="${encodeURIComponent('Weather Overlay_Tornado.png')}" class="weather-sprite">`;
                }

            } catch (err) {
                console.error(err);
                errorDisplay.innerText = 'Sync Error: Check GitHub main/my-pages branch for weather.json';
            }
        }

        updateDashboard();
        setInterval(updateDashboard, 60000); // Check for updates every minute
    </script>
</body>
</html>
