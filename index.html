<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lazy's 1930s Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a1a;
            font-family: 'Special Elite', 'Courier New', Courier, monospace;
        }

        /* 1930s Film Grain Overlay */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.35;
            pointer-events: none;
            z-index: 9999;
            animation: filmGrain 8s steps(10) infinite;
        }

        @keyframes filmGrain {
            0%, 100% { background-position: 0 0; }
            50% { background-position: 10px 10px; }
        }

        #dashboard-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
        }

        #stage {
            position: relative;
            width: 100%;
            height: 55vh; 
            overflow: hidden;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            box-shadow: inset 0 -15px 40px rgba(0,0,0,0.9);
            border-bottom: 6px solid #000;
        }

        #background-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover; 
            background-repeat: no-repeat;
            background-position: center center;
            transition: background-image 1s ease-in-out;
            z-index: 1;
            animation: jostle 20s ease-in-out infinite;
            filter: grayscale(80%) sepia(40%) contrast(120%) brightness(90%);
        }

        @keyframes jostle {
            0%, 100% { transform: scale(1.02) translate(0, 0); }
            50% { transform: scale(1.02) translate(-2px, 2px); }
        }

        #weather-overlay-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: flex-start;
            z-index: 2; pointer-events: none;
        }

        .weather-sprite {
            width: 18%;
            max-width: 220px;
            margin-top: 1%;
            filter: drop-shadow(0 0 15px rgba(0,0,0,0.6));
        }

        #character-layer {
            position: absolute;
            bottom: 6%; 
            left: 5%; 
            z-index: 3;
            transition: all 0.5s ease-in-out;
            pointer-events: none;
        }

        #characters {
            height: 30vh; 
            filter: drop-shadow(10px 10px 0px rgba(0,0,0,0.5)) grayscale(20%) sepia(30%);
            animation: bounce 2.5s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        #particle-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 4; pointer-events: none;
        }

        #fog-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/fog.png');
            opacity: 0; z-index: 5; pointer-events: none;
            transition: opacity 3s ease-in-out;
            animation: fogDrift 60s linear infinite;
        }

        @keyframes fogDrift {
            0% { background-position: 0 0; }
            100% { background-position: 1000px 0; }
        }

        #info-plaque {
            position: absolute;
            top: 25px; right: 25px; 
            background: #e6dfcc;
            background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png');
            color: #1a1a1a;
            padding: 15px 30px;
            border: 5px solid #000;
            border-radius: 15px;
            z-index: 30;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.6);
            display: flex; flex-direction: column; gap: 5px;
            transform: rotate(2deg);
        }

        #time-display { font-size: 20px; font-weight: bold; border-bottom: 3px dashed #000; padding-bottom: 8px; margin-bottom: 5px; }
        #temp-display { font-size: 42px; font-weight: bold; letter-spacing: -2px; }
        #desc-display { font-size: 16px; font-weight: bold; }
        .error-box { color: #cc0000; font-size: 12px; margin-top: 5px; font-weight: bold; }

        /* Links Dock */
        #links-dock {
            position: fixed;
            bottom: 0; z-index: 20; width: 100%; height: 45vh; 
            background: rgba(25, 25, 25, 0.95);
            background-image: url('https://www.transparenttextures.com/patterns/old-wall.png');
            backdrop-filter: blur(10px);
            border-top: 6px solid #000;
            display: flex; justify-content: center; align-content: flex-start; 
            flex-wrap: wrap; gap: 35px; overflow-y: auto;
            padding: 50px 40px; box-sizing: border-box;
            box-shadow: inset 0 20px 30px -10px rgba(0,0,0,0.9);
        }

        #links-dock::-webkit-scrollbar { width: 16px; }
        #links-dock::-webkit-scrollbar-track { background: #1a1a1a; border-left: 3px solid #000; }
        #links-dock::-webkit-scrollbar-thumb { background: #333; border: 3px solid #000; border-radius: 8px;}
        #links-dock::-webkit-scrollbar-thumb:hover { background: #555; }

        .app-link {
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            flex-shrink: 0; position: relative;
            background: #fff; border-radius: 20px; border: 4px solid #000; padding: 5px;
            box-shadow: 6px 6px 0px rgba(0,0,0,0.5);
        }

        .app-link::after {
            content: attr(data-title);
            position: absolute; bottom: -35px; left: 50%; transform: translateX(-50%);
            color: #e0d5c1; font-size: 14px; font-weight: bold;
            text-shadow: 2px 2px 0px #000; opacity: 0; transition: opacity 0.2s;
            pointer-events: none; white-space: nowrap; letter-spacing: 2px;
        }

        .app-link:hover { transform: scale(1.1) translateY(-5px); box-shadow: 10px 10px 0px rgba(0,0,0,0.6); }
        .app-link:hover::after { opacity: 1; }
        .app-icon { width: 90px; height: 90px; object-fit: contain; border-radius: 12px; filter: grayscale(100%) sepia(30%) contrast(150%); transition: all 0.4s ease; }
        .app-link:hover .app-icon { filter: grayscale(0%) sepia(0%); }

        #debug-container {
            position: absolute;
            bottom: 25px;
            right: 25px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        #debug-menu {
            display: none; /* Hidden by default */
            background: #e6dfcc;
            background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png');
            border: 4px solid #000;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.6);
            width: 200px;
        }

        #debug-menu h3 { margin: 0 0 10px 0; border-bottom: 2px dashed #000; padding-bottom: 5px; text-align: center; font-size: 16px;}
        #debug-menu button {
            display: block; width: 100%; margin-bottom: 6px; padding: 6px;
            background: #fff; border: 2px solid #000; font-family: 'Special Elite', monospace;
            font-weight: bold; cursor: pointer; transition: 0.2s; border-radius: 4px;
        }
        #debug-menu button:hover { background: #1a1a1a; color: #fff; transform: translateX(-3px); box-shadow: 4px 4px 0px rgba(0,0,0,0.4); }
        
        .debug-resume { background: #d9534f !important; color: #fff; border-color: #000 !important; margin-top: 10px; }
        .debug-resume:hover { background: #c9302c !important; }

        #debug-gear {
            width: 50px; height: 50px; background: #e6dfcc; border: 4px solid #000;
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 28px; cursor: pointer; box-shadow: 6px 6px 0px rgba(0,0,0,0.6);
            transition: transform 0.3s ease;
        }
        #debug-gear:hover { transform: rotate(45deg) scale(1.1); }
    </style>
</head>
<body>
    <div id="dashboard-container">
        
        <!-- Stage / Cinematic Viewport -->
        <div id="stage">
            <div id="background-layer"></div>
            <div id="weather-overlay-layer"></div>
            
            <div id="character-layer">
                <img id="characters" src="" alt="Characters">
            </div>
            
            <canvas id="particle-canvas"></canvas>
            <div id="fog-layer"></div>

            <div id="info-plaque">
                <div id="time-display">--:--:--</div>
                <div id="temp-display">WAITING...</div>
                <div id="desc-display">---</div>
                <div id="error-display" class="error-box"></div>
            </div>

            <!-- Developer Debug Controls -->
            <div id="debug-container">
                <div id="debug-menu">
                    <h3>Weather Tester</h3>
                    <button onclick="forceWeather(85, 'clear')">☀️ Heatwave (85°)</button>
                    <button onclick="forceWeather(75, 'clear')">⛅ Warm (75°)</button>
                    <button onclick="forceWeather(65, 'clear')">☁️ Mild (65°)</button>
                    <button onclick="forceWeather(45, 'clear')">🧥 Chilly (45°)</button>
                    <button onclick="forceWeather(20, 'clear')">🥶 Freezing (20°)</button>
                    <hr style="border: 1px solid #000; margin: 10px 0;">
                    <button onclick="forceWeather(50, 'rain')">🌧️ Rain</button>
                    <button onclick="forceWeather(25, 'snow')">❄️ Snow</button>
                    <button onclick="forceWeather(40, 'hail')">🧊 Hail</button>
                    <button onclick="forceWeather(55, 'fog')">🌫️ Fog</button>
                    <button onclick="forceWeather(70, 'tornado')">🌪️ Tornado</button>
                    <button class="debug-resume" onclick="resumeLiveWeather()">🔄 Resume Live</button>
                </div>
                <div id="debug-gear" onclick="toggleDebugMenu()" title="Toggle Weather Testing">⚙️</div>
            </div>
        </div>

        <!-- App Links Dock -->
        <div id="links-dock">
            <a href="https://mail.google.com" target="_blank" class="app-link" data-title="Gmail"><img src="gmail.png" alt="Gmail" class="app-icon"></a>
            <a href="https://youtube.com" target="_blank" class="app-link" data-title="YouTube"><img src="youtube.png" alt="YouTube" class="app-icon"></a>
            <a href="https://drive.google.com" target="_blank" class="app-link" data-title="Drive"><img src="googleDrive.png" alt="Drive" class="app-icon"></a>
            <a href="https://calendar.google.com" target="_blank" class="app-link" data-title="Calendar"><img src="googleCalendar.png" alt="Calendar" class="app-icon"></a>
            <a href="https://messages.google.com" target="_blank" class="app-link" data-title="Messages"><img src="messages.png" alt="Messages" class="app-icon"></a>
            <a href="https://notebooklm.google.com" target="_blank" class="app-link" data-title="NotebookLM"><img src="noteBookLM.png" alt="Notebook" class="app-icon"></a>
            <a href="https://web.stremio.com" target="_blank" class="app-link" data-title="Stremio"><img src="stremio.png" alt="Stremio" class="app-icon"></a>
            <a href="https://www.cheapshark.com" target="_blank" class="app-link" data-title="CheapShark"><img src="cheapShark.png" alt="CheapShark" class="app-icon"></a>
            <a href="http://192.168.40.149:9443" target="_blank" class="app-link" data-title="Portainer"><img src="portainer.png" alt="Portainer" class="app-icon"></a>
            <a href="http://192.168.40.149:8096" target="_blank" class="app-link" data-title="Jellyfin"><img src="Jellyfin.png" alt="Jellyfin" class="app-icon"></a>
            <a href="http://192.168.40.149:3001" target="_blank" class="app-link" data-title="Local AI"><img src="Ilm.png" alt="Local AI" class="app-icon"></a>
            <a href="https://mail.proton.me" target="_blank" class="app-link" data-title="ProtonMail"><img src="protonMail.png" alt="ProtonMail" class="app-icon"></a>
            <a href="https://drive.proton.me" target="_blank" class="app-link" data-title="ProtonDrive"><img src="protonDrive.png" alt="ProtonDrive" class="app-icon"></a>
            <a href="https://calendar.proton.me" target="_blank" class="app-link" data-title="ProtonCalendar"><img src="protonCalendar.png" alt="ProtonCalendar" class="app-icon"></a>
            <a href="https://www.nerdwallet.com" target="_blank" class="app-link" data-title="NerdWallet"><img src="nerdWallet.png" alt="NerdWallet" class="app-icon"></a>
            <a href="https://cad.onshape.com" target="_blank" class="app-link" data-title="OnShape"><img src="onShape.png" alt="OnShape" class="app-icon"></a>
            <a href="https://www.photopea.com" target="_blank" class="app-link" data-title="PhotoPea"><img src="photoPea.png" alt="PhotoPea" class="app-icon"></a>
            <a href="https://lemmy.world" target="_blank" class="app-link" data-title="Lemmy"><img src="lemmy.png" alt="Lemmy" class="app-icon"></a>
        </div>
    </div>

    <script>
        // Exact filenames based on user specifications
        const ASSETS = {
            bgChilly: "Background_35-59°F (Chilly).jpeg",
            bgMild: "Background_60-69°F (Mild).jpeg",
            bgWarm: "Background_70-79°F (Warm).jpg",
            bgHeatwave: "Background\t80°F+ (Heatwave).png", 
            charFreezing: "Character Sprite\t<35°F (Freezing).png",
            charChilly: "Character Sprite\t35-59°F (Chilly).png",
            charWarm: "Character Sprite\t70-79°F (Warm).png",
            charHeatwave: "Character Sprite\t80°F+ (Heatwave).png",
            overlayHail: "Weather Overlay\tHail.png"
        };

        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let weatherType = 'clear';
        let isTestingMode = false; // Flag to prevent fetch from overriding manual tests

        // Resize handler
        function resizeCanvas() {
            const stage = document.getElementById('stage');
            canvas.width = stage.clientWidth;
            canvas.height = stage.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Particle Class
        class Particle {
            constructor(type) {
                this.type = type;
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * -canvas.height;
                this.speed = (this.type === 'snow') ? Math.random() * 2 + 1 : Math.random() * 10 + 8;
                this.size = (this.type === 'hail') ? Math.random() * 6 + 4 : Math.random() * 3 + 2;
                this.wind = Math.random() * 3 - 1.5;
            }
            update() {
                this.y += this.speed;
                this.x += this.wind;
                if (this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.beginPath();
                if (this.type === 'rain') {
                    ctx.strokeStyle = 'rgba(200, 200, 200, 0.8)';
                    ctx.lineWidth = 3;
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(this.x + (this.wind * 2), this.y + 25);
                    ctx.stroke();
                } else {
                    ctx.fillStyle = 'rgba(230, 230, 230, 0.9)';
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            }
        }

        function initParticles(type) {
            particles = [];
            let count = (type === 'rain') ? 200 : (type === 'snow') ? 120 : 70;
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(type));
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (['rain', 'snow', 'hail'].includes(weatherType)) {
                particles.forEach(p => { p.update(); p.draw(); });
            }
            requestAnimationFrame(animate);
        }
        animate();

        // Clock Update
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            
            hours = hours % 12;
            hours = hours ? hours : 12; 
            minutes = minutes < 10 ? '0' + minutes : minutes;
            seconds = seconds < 10 ? '0' + seconds : seconds;
            
            document.getElementById('time-display').innerText = hours + ':' + minutes + ':' + seconds + ' ' + ampm;
        }
        setInterval(updateClock, 1000);
        updateClock();

        function renderDashboardState(temp, weatherDesc, isTest = false) {
            document.getElementById('temp-display').innerText = temp + (isTest ? '°F (TEST)' : '°F');
            document.getElementById('desc-display').innerText = weatherDesc;

            let bgFile = '';
            let charFile = '';

            // Temperature Based Rules
            if (temp >= 80) {
                bgFile = ASSETS.bgHeatwave;
                charFile = ASSETS.charHeatwave;
            } else if (temp >= 70) {
                bgFile = ASSETS.bgWarm;
                charFile = ASSETS.charWarm;
            } else if (temp >= 60) {
                bgFile = ASSETS.bgMild;
                charFile = ASSETS.charWarm; // Closest available character sprite
            } else if (temp >= 35) {
                bgFile = ASSETS.bgChilly;
                charFile = ASSETS.charChilly;
            } else {
                bgFile = ASSETS.bgChilly; // Fallback background for extreme cold
                charFile = ASSETS.charFreezing;
            }

            // Apply images cleanly utilizing encodeURIComponent to handle special characters (tabs/spaces)
            document.getElementById('background-layer').style.backgroundImage = `url('${encodeURIComponent(bgFile)}')`;
            document.getElementById('characters').src = encodeURIComponent(charFile);

            // Weather Overlay Logic
            const overlayLayer = document.getElementById('weather-overlay-layer');
            const fogLayer = document.getElementById('fog-layer');
            overlayLayer.innerHTML = '';
            fogLayer.style.opacity = '0';
            weatherType = 'clear';

            const descStr = weatherDesc.toLowerCase();
            if (descStr.includes('rain')) {
                weatherType = 'rain';
                overlayLayer.innerHTML = `<img src="${encodeURIComponent('Weather Overlay_Rain.png')}" class="weather-sprite">`;
                initParticles('rain');
            } else if (descStr.includes('snow')) {
                weatherType = 'snow';
                overlayLayer.innerHTML = `<img src="${encodeURIComponent('Weather Overlay_Snow.png')}" class="weather-sprite">`;
                initParticles('snow');
            } else if (descStr.includes('hail')) {
                weatherType = 'hail';
                overlayLayer.innerHTML = `<img src="${encodeURIComponent(ASSETS.overlayHail)}" class="weather-sprite">`;
                initParticles('hail');
            } else if (descStr.includes('fog') || descStr.includes('mist')) {
                fogLayer.style.opacity = '0.7';
            } else if (descStr.includes('tornado')) {
                overlayLayer.innerHTML = `<img src="${encodeURIComponent('Weather Overlay_Tornado.png')}" class="weather-sprite">`;
            }
        }

        // Live Fetch Logic
        async function fetchLiveDashboard() {
            if (isTestingMode) return; // Prevent live updates from overwriting manual tests

            const errorDisplay = document.getElementById('error-display');
            try {
                const response = await fetch('weather.json?t=' + new Date().getTime());
                if (!response.ok) throw new Error('Data Sync Missing');
                
                const data = await response.json();
                errorDisplay.innerText = '';
                renderDashboardState(parseInt(data.temp), data.weather, false);

            } catch (err) {
                errorDisplay.innerText = 'TELGRAPH OFFLINE';
            }
        }

        // Initialize and setup intervals
        fetchLiveDashboard();
        setInterval(fetchLiveDashboard, 60000);

        function toggleDebugMenu() {
            const menu = document.getElementById('debug-menu');
            menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
        }

        function forceWeather(temp, desc) {
            isTestingMode = true; // Suspend live fetching
            document.getElementById('error-display').innerText = 'TEST MODE ACTIVE';
            document.getElementById('error-display').style.color = '#ff8800';
            document.getElementById('error-display').style.borderTopColor = '#ff8800';
            renderDashboardState(temp, desc, true);
        }

        function resumeLiveWeather() {
            isTestingMode = false;
            document.getElementById('error-display').style.color = '#cc0000';
            document.getElementById('error-display').style.borderTopColor = '#cc0000';
            document.getElementById('error-display').innerText = '';
            document.getElementById('temp-display').innerText = 'WAITING...';
            document.getElementById('debug-menu').style.display = 'none';
            fetchLiveDashboard(); // Immediately fetch real data
        }

    </script>
</body>
</html>
