<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lazy's 1930s Dashboard</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a1a;
            font-family: 'Courier New', Courier, monospace;
        }

        #dashboard-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Layer 1: Background */
        #background-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: background-image 1s ease-in-out;
            z-index: 1;
        }

        /* Layer 2: Weather Overlays (Sprites) */
        #weather-overlay-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            z-index: 2;
            pointer-events: none;
        }

        .weather-sprite {
            width: 300px;
            margin-top: 20px;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
        }

        /* Layer 3: Particles (Rain/Snow/Hail) */
        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
        }

        /* Layer 4: Fog Effect */
        #fog-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 200%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/fog.png');
            opacity: 0;
            z-index: 4;
            pointer-events: none;
            animation: fogMove 60s linear infinite;
            transition: opacity 2s ease-in-out;
        }

        @keyframes fogMove {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        /* Layer 5: Characters */
        #character-layer {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            transition: all 0.5s ease-in-out;
        }

        #characters {
            height: 450px;
            filter: drop-shadow(5px 5px 15px rgba(0,0,0,0.7));
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* UI Elements */
        #weather-info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #555;
            z-index: 10;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .error-box {
            color: #ff4444;
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div id="dashboard-container">
        <div id="background-layer"></div>
        <div id="weather-overlay-layer"></div>
        <canvas id="particle-canvas"></canvas>
        <div id="fog-layer"></div>
        <div id="character-layer">
            <img id="characters" src="" alt="Jeremy and Sasha">
        </div>

        <div id="weather-info">
            <div id="temp-display">Loading...</div>
            <div id="desc-display">---</div>
            <div id="error-display" class="error-box"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let weatherType = 'clear';

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(type) {
                this.type = type;
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * -canvas.height;
                this.speed = (this.type === 'snow') ? Math.random() * 2 + 1 : Math.random() * 5 + 5;
                this.size = (this.type === 'hail') ? Math.random() * 4 + 2 : Math.random() * 2 + 1;
                this.wind = Math.random() * 1 - 0.5;
            }
            update() {
                this.y += this.speed;
                this.x += this.wind;
                if (this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.beginPath();
                if (this.type === 'rain') {
                    ctx.strokeStyle = 'rgba(174, 194, 224, 0.5)';
                    ctx.lineWidth = 1;
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(this.x, this.y + 10);
                    ctx.stroke();
                } else {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function initParticles(type) {
            particles = [];
            let count = (type === 'rain') ? 150 : (type === 'snow') ? 100 : 50;
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(type));
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (['rain', 'snow', 'hail'].includes(weatherType)) {
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
            }
            requestAnimationFrame(animate);
        }
        animate();

        async function updateDashboard() {
            const errorDisplay = document.getElementById('error-display');
            try {
                // Fetching from your specific weather.json path
                const response = await fetch('weather.json?t=' + new Date().getTime());
                if (!response.ok) throw new Error('Failed to load weather data');
                
                const data = await response.json();
                const temp = data.temp;
                const weatherDesc = data.weather.toLowerCase();

                document.getElementById('temp-display').innerText = temp + '°F';
                document.getElementById('desc-display').innerText = weatherDesc;
                errorDisplay.innerText = '';

                // Logic for Background & Characters
                let bgFile = '';
                let charFile = '';

                if (temp >= 80) {
                    bgFile = 'Background	80°F+ (Heatwave).png';
                    charFile = 'Character Sprite	80°F+ (Heatwave).png';
                } else if (temp >= 70) {
                    bgFile = 'Background_70-79°F (Warm).jpg';
                    charFile = 'Character Sprite	70-79°F (Warm).png';
                } else if (temp >= 60) {
                    bgFile = 'Background_60-69°F (Mild).jpeg';
                    charFile = 'Character Sprite	60-69°F (Mild).png';
                } else if (temp >= 35) {
                    bgFile = 'Background_35-59°F (Chilly).jpeg';
                    charFile = 'Character Sprite	35-59°F (Chilly).png';
                } else {
                    bgFile = 'Background_35-59°F (Chilly).jpeg'; // Use chilly as base for freezing if specific background is missing
                    charFile = 'Character Sprite	<35°F (Freezing).png';
                }

                document.getElementById('background-layer').style.backgroundImage = `url('${bgFile}')`;
                document.getElementById('characters').src = charFile;

                // Weather Overlay & Particle Logic
                const overlayLayer = document.getElementById('weather-overlay-layer');
                const fogLayer = document.getElementById('fog-layer');
                overlayLayer.innerHTML = '';
                fogLayer.style.opacity = '0';
                weatherType = 'clear';

                if (weatherDesc.includes('rain')) {
                    weatherType = 'rain';
                    overlayLayer.innerHTML = '<img src="Weather Overlay	Rain.png" class="weather-sprite">';
                    initParticles('rain');
                } else if (weatherDesc.includes('snow')) {
                    weatherType = 'snow';
                    overlayLayer.innerHTML = '<img src="Weather Overlay	Snow.png" class="weather-sprite">';
                    initParticles('snow');
                } else if (weatherDesc.includes('hail')) {
                    weatherType = 'hail';
                    overlayLayer.innerHTML = '<img src="Weather Overlay	Hail.png" class="weather-sprite">';
                    initParticles('hail');
                } else if (weatherDesc.includes('fog') || weatherDesc.includes('mist')) {
                    fogLayer.style.opacity = '0.5';
                } else if (weatherDesc.includes('tornado')) {
                    overlayLayer.innerHTML = '<img src="Weather Overlay	Tornado.png" class="weather-sprite">';
                }

            } catch (err) {
                console.error(err);
                errorDisplay.innerText = 'Sync Error: Check weather.json on GitHub';
            }
        }

        // Run on load and every minute
        updateDashboard();
        setInterval(updateDashboard, 60000);
    </script>
</body>
</html>
